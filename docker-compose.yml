services:
  db:
    image: postgres:16
    container_name: smartseason_db
    restart: always
    environment:
      POSTGRES_USER: smartseason
      POSTGRES_PASSWORD: smartseason123
      POSTGRES_DB: smartseason
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: smartseason_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smartseason.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data: